services:
  postgres:
    image: postgres:15-alpine
    container_name: carbon-calculator-db
    environment:
      POSTGRES_DB: carbon_calculator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - carbon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: carbon-calculator-backend
    ports:
      - "9000:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/carbon_calculator
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - carbon-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: carbon-calculator-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - carbon-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  carbon-network:
    driver: bridge
