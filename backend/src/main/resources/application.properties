# Application
spring.application.name=carbon-calculator
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/carbon_calculator
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Configuration
app.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:4200,http://localhost:19006,exp://192.168.1.*
